---

- ansible.builtin.include_role: # config bashrc
    name: alex.debian13.configbash

- name: Install a list of packages
  apt:
    name: "{{ packages }}"
    state: present
    update_cache: yes
  vars:
    packages:
    - curl
    - jq
    - pip
    - expect
    - git
    - cifs-utils
    - nmap
    - xorriso
    - libssl3
    - dnsutils
    - apt-transport-https
    - curl
    - wget
    # - net-utils
    ansible_connection: "{{ prop_ansible_connection }}"
    ansible_host: "{{ prop_ipaddress }}"
  become: true

- name: Install a list of python packages
  ansible.builtin.pip:
    name: "{{ packages }}"
    state: present
  environment:
    PIP_BREAK_SYSTEM_PACKAGES: 1
  vars:
    packages:
    - pyyaml
    - docker
    - 'fastapi[all]'
    - 'pymongo[srv]'
    - python-dotenv
    - requests_toolbelt
    ansible_connection: "{{ prop_ansible_connection }}"
    ansible_host: "{{ prop_ipaddress }}"
  become: true


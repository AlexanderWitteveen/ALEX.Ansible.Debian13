---

- ansible.builtin.include_role: # create datafolders
    name: alex.debian13.datafolders
  vars:
    args_datafolder_local: 
      - name: docker

- name: Install a list of packages
  apt:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
    - ca-certificates 
    - curl
    - gnupg
    - python3-debian
    ansible_connection: "{{ prop_ansible_connection }}"
    ansible_host: "{{ prop_host.ipaddress }}"
  become: true

- name: Add Docker apt repository key.
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/debian/gpg"
    dest: "/usr/share/keyrings/docker.gpg"
    mode: '0644'
    force: true
  vars:
    ansible_connection: "{{ prop_ansible_connection }}"
    ansible_host: "{{ prop_host.ipaddress }}"
  become: true

# - name: Add Debian apt repository.
#   ansible.builtin.apt_repository:
#     repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker.gpg] https://download.docker.com/linux/debian/ trixie stable"
#     filename: docker
#     state: present
#   vars:
#     ansible_connection: "{{ prop_ansible_connection }}"
#     ansible_host: "{{ prop_host.ipaddress }}"
#   become: true

- name: Add debian repo
  deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/debian/
    suites: trixie
    components: stable
    signed_by: /usr/share/keyrings/docker.gpg
    architectures: amd64
  vars:
    ansible_connection: "{{ prop_ansible_connection }}"
    ansible_host: "{{ prop_host.ipaddress }}"
  become: true

- name: Install a list of packages
  apt:
    name: "{{ packages }}"
    state: present
    update_cache: yes
  vars:
    packages:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - apache2-utils
    - docker-buildx-plugin
    - docker-compose-plugin
    - python3-requests
    ansible_connection: "{{ prop_ansible_connection }}"
    ansible_host: "{{ prop_host.ipaddress }}"
  become: true

- name: Copy profile file
  ansible.builtin.template:
    src: "deamon.json.j2"
    dest: "/etc/docker/daemon.json"
    owner: root
    group: root
    mode: 0777
  vars:
    ansible_connection: "{{ prop_ansible_connection }}"
    ansible_host: "{{ prop_host.ipaddress }}"
  become: true

- name: restart docker
  ansible.builtin.service:
    name: docker
    state: restarted
  vars:
    ansible_connection: "{{ prop_ansible_connection }}"
    ansible_host: "{{ prop_host.ipaddress }}"
  become: true

- name: Configure Network
  shell: |
    if [ $(docker network list | grep alex0 | wc -l) -eq 0 ]
    then
      docker network create --driver=bridge alex0
    fi
  args:
    executable: /bin/bash
  vars:
    ansible_connection: "{{ prop_ansible_connection }}"
    ansible_host: "{{ prop_host.ipaddress }}"
  become: true



